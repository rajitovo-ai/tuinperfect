<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160" width="100%" height="100%">
  <defs>
    <!-- Sticker Drop Shadow Filter -->
    <filter id="sticker-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#000000" flood-opacity="1"/>
    </filter>
  </defs>
  
  <g filter="url(#sticker-shadow)">
    <!-- "TUIN" Text on Top -->
    <text x="15" y="65" 
          font-family="'Work Sans', sans-serif" 
          font-size="62" 
          font-weight="900" 
          font-style="italic" 
          letter-spacing="-0.03em"
          fill="#ffffff" 
          stroke="#000000" 
          stroke-width="7" 
          stroke-linejoin="round"
          paint-order="stroke fill">TUIN</text>
          
    <!-- "PERFECT" Text on the Bottom -->
    <text x="15" y="130" 
          font-family="'Work Sans', sans-serif" 
          font-size="52" 
          font-weight="900" 
          font-style="italic" 
          letter-spacing="-0.02em"
          fill="#FCD202" 
          stroke="#000000" 
          stroke-width="7" 
          stroke-linejoin="round"
          paint-order="stroke fill">PERFECT</text>
  </g>
</svg>
