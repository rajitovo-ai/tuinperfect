<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 70" width="100%" height="100%">
  <defs>
    <!-- Sticker Drop Shadow Filter -->
    <filter id="sticker-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#000000" flood-opacity="1"/>
    </filter>
  </defs>
  
  <g filter="url(#sticker-shadow)">
    <!-- Rake (Hark) Icon on the Left -->
    <g transform="translate(10, 8)" stroke="#000000" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
      <!-- Rake Handle -->
      <line x1="25" y1="4" x2="25" y2="36" stroke="#FCD202" stroke-width="7"/>
      <!-- Rake Head Connection -->
      <path d="M 12 36 L 25 31 L 38 36 Z" fill="#FCD202"/>
      <!-- Rake Crossbar -->
      <line x1="8" y1="36" x2="42" y2="36" stroke="#FCD202" stroke-width="7"/>
      <!-- Rake Tines -->
      <line x1="10" y1="36" x2="10" y2="46" stroke="#FCD202" stroke-width="4.5"/>
      <line x1="17.5" y1="36" x2="17.5" y2="46" stroke="#FCD202" stroke-width="4.5"/>
      <line x1="25" y1="36" x2="25" y2="46" stroke="#FCD202" stroke-width="4.5"/>
      <line x1="32.5" y1="36" x2="32.5" y2="46" stroke="#FCD202" stroke-width="4.5"/>
      <line x1="40" y1="36" x2="40" y2="46" stroke="#FCD202" stroke-width="4.5"/>
    </g>
    
    <!-- Text "TUIN PERFECT" -->
    <text x="75" y="46" 
          font-family="'Work Sans', sans-serif" 
          font-size="36" 
          font-weight="900" 
          font-style="italic" 
          letter-spacing="-0.03em"
          fill="#ffffff" 
          stroke="#000000" 
          stroke-width="5" 
          stroke-linejoin="round"
          paint-order="stroke fill">TUIN</text>
          
    <text x="175" y="46" 
          font-family="'Work Sans', sans-serif" 
          font-size="36" 
          font-weight="900" 
          font-style="italic" 
          letter-spacing="-0.02em"
          fill="#FCD202" 
          stroke="#000000" 
          stroke-width="5" 
          stroke-linejoin="round"
          paint-order="stroke fill">PERFECT</text>
  </g>
</svg>
