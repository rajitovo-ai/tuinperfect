<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 170" width="100%" height="100%">
  <defs>
    <!-- Sticker Drop Shadow Filter -->
    <filter id="sticker-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#000000" flood-opacity="1"/>
    </filter>
  </defs>
  
  <g filter="url(#sticker-shadow)">
    <!-- DIAGONAL GARDENING TOOL IN BACKGROUND (Solid Black) -->
    <g stroke="#000000" fill="#000000">
      <!-- Handle -->
      <line x1="28" y1="28" x2="225" y2="145" stroke-width="10" stroke-linecap="round"/>
      
      <!-- Top-Left Rake Head (Rotated) -->
      <g transform="translate(28, 28) rotate(-45)">
        <!-- Rake Crossbar -->
        <line x1="-15" y1="0" x2="15" y2="0" stroke-width="8" stroke-linecap="round"/>
        <!-- Rake Tines -->
        <line x1="-12" y1="0" x2="-12" y2="10" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="-6" y1="0" x2="-6" y2="10" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="0" y2="10" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="6" y1="0" x2="6" y2="10" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="12" y1="0" x2="12" y2="10" stroke-width="4.5" stroke-linecap="round"/>
      </g>
      
      <!-- Bottom-Right Spade Head (Rotated) -->
      <g transform="translate(225, 145) rotate(-45)">
        <!-- Spade Blade -->
        <path d="M-8,0 C-8,10 0,16 0,18 C0,16 8,10 8,0 Z" stroke-width="4" stroke-linejoin="round"/>
        <!-- Spade Shoulder Connection -->
        <line x1="-6" y1="0" x2="6" y2="0" stroke-width="6"/>
      </g>
    </g>

    <!-- TEXT & STAR LAYER ON TOP -->
    <!-- "TUIN" Text -->
    <text x="15" y="65" 
          font-family="'Work Sans', sans-serif" 
          font-size="62" 
          font-weight="900" 
          font-style="italic" 
          letter-spacing="-0.03em"
          fill="#ffffff" 
          stroke="#000000" 
          stroke-width="7.5" 
          stroke-linejoin="round"
          paint-order="stroke fill">TUIN</text>
          
    <!-- Star Icon Nestled on the Right -->
    <g transform="translate(195, 20)">
      <polygon points="20,1 26,13 39,15 29,25 32,38 20,32 8,38 11,25 1,15 14,13" 
               fill="#FCD202" 
               stroke="#000000" 
               stroke-width="4" 
               stroke-linejoin="round"/>
    </g>
          
    <!-- "PERFECT" Text -->
    <text x="15" y="130" 
          font-family="'Work Sans', sans-serif" 
          font-size="52" 
          font-weight="900" 
          font-style="italic" 
          letter-spacing="-0.02em"
          fill="#FCD202" 
          stroke="#000000" 
          stroke-width="7.5" 
          stroke-linejoin="round"
          paint-order="stroke fill">PERFECT</text>
  </g>
</svg>
