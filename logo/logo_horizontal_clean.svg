<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 70" width="100%" height="100%">
  <defs>
    <!-- Sticker Drop Shadow Filter -->
    <filter id="sticker-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#000000" flood-opacity="1"/>
    </filter>
  </defs>
  
  <g filter="url(#sticker-shadow)">
    <!-- Star Icon on the Left -->
    <g transform="translate(10, 8)">
      <polygon points="25,2 32,17 49,19 36,31 40,48 25,40 10,48 14,31 1,19 18,17" 
               fill="#FCD202" 
               stroke="#000000" 
               stroke-width="4.5" 
               stroke-linejoin="round"/>
    </g>
    
    <!-- Text "TUIN PERFECT" -->
    <text x="75" y="46" 
          font-family="'Work Sans', sans-serif" 
          font-size="36" 
          font-weight="900" 
          font-style="italic" 
          letter-spacing="-0.03em"
          fill="#ffffff" 
          stroke="#000000" 
          stroke-width="5" 
          stroke-linejoin="round"
          paint-order="stroke fill">TUIN</text>
          
    <text x="175" y="46" 
          font-family="'Work Sans', sans-serif" 
          font-size="36" 
          font-weight="900" 
          font-style="italic" 
          letter-spacing="-0.02em"
          fill="#FCD202" 
          stroke="#000000" 
          stroke-width="5" 
          stroke-linejoin="round"
          paint-order="stroke fill">PERFECT</text>
  </g>
</svg>
